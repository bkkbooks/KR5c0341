front:
  text: 紅鉛入黑鉛訣真金鑄神室雞子其形容紅鉛藏室中封固本土封固口縫又通身固一指厚入鼎內其下鼎用本土為之其上釜用真金為之外固口縫懸於竈中運用水火九十日成黑鉛名先天鉛同天生黑鉛入灰池脫去黑衣十分精潔名九鍊精縱橫變化妙用無方
  hash: sha256:2a044c91eb5c07d977d2a105b96b28dfbc2e69cc0210902667ef3219f098224c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0341_HFL_000-001a, image: hfl/0598/0598-110.png}
body:
  text: 鼎器訣本土或如黃蠟膩或青黑色研淘有石沙子或如油麻粒大小不等或黃色研破有朱砂者此土力大搗篩訖和作泥惟熟惟妙造鼎通長一尺二寸周圍一尺五寸中虛五寸厚一寸一分上下通直口偃如鍋釜卧唇仰折周圍約三尺二寸心橫有一尺唇環匝髙二寸上水入鼎八寸制汞入河車訣陽汞半斤隂汞八兩配合入鼎室如法固濟取四殺刑尅陽日陽時火用直符長去鼎子底一寸蓋覆運動常以草灰掩蔽堅埋直符用事並依六候進退訣只用本土為神室真金安室內用汞澆固濟入鼎釜運水火而變河車陽汞半斤世水銀八兩配合入鼎釡固濟作壇圈埋灰中向上灰厚五寸長於上頭運火初五兩一伏時加十三兩一伏時又加至一斤一本只依此斤晝夜都至三十日取二兩點汞一斤為白道其銀二兩還將轉點銅一斤為大銀鼎釜本土作泥造之如雞子形長七寸闊五寸趂潤截斷曝乾口虛各闊三寸漸漸底尖各深二寸裏外並如雞子形兩扇唇口雌雄造之不得差誤利用術用此鼎器足氣火候子中三兩寅初四兩卯中五兩已初六兩一本午中六兩申初五兩酉中四兩一本亥初三兩金液火候火數一斤水數亦一斤火一水十五水六火十數明火進即水退水長即火消也子丑寅卯辰已六時屬陽進火之候也午未申酉成亥六時屬隂退火之候也以一斤之數擘之為三百八十四銖進退於一日之內則一時進退六十四銖矣其進也必一本以漸其退也亦以漸細意調燮一志而修還丹用火直符六候進退訣月有六候候有五日二氣分二日半三十時一氣二氣一候六候一月一月換一鼎土神室也至九箇月九鼎即止第一本一十鼎任意消息換鼎不換鼎並得換一本之轉妙第一月一日初候發火一兩至二日半三十時進一兩至六十時第六日第二候初三兩三十時進四兩至六十時第十一日第三候初五兩三十時進六兩至六十時第十六日第四候初仍用六兩三十時退五兩至六十時第二十一日第五候初退四兩三十時復退三兩至六十時第二十六日第六候初退二兩三十時復退一兩至六十時一本第二月一日初候發火二兩至二日半三十時進三兩至六十時以次每遇換鼎入月諸候比之前月諸候加火一兩至九箇月初候用九兩至三十時進十兩至六十時第二候十一兩三十時進十二兩至六十時第三候十三兩三十時進十四兩至六十時第四候十四兩三十時退十三兩至六十時第五候退十二兩三十時復退十一兩至六十時第六候退十兩三十時復退九兩至六十時足第十月後常一本取一時第九月火候法則進退斤兩為定不論年月也其火進退須別添熟炭常應露火面則候為本斤兩數也服餌并制汞分兩訣守運十五日一兩點汞一斤成白道守運三十日堪服可二兩守運一年半兩點汞一斤為自道餌一兩半凡疾不侵守運二年一分點汞一斤為白道服餌可三分又公可服半兩守運三年刀圭制汞一斤為赤道服餌可一分住世不死守運五年刀圭點鐡及汞一斤成赤道服餌可麻子大七粒守運九年畢法能化五金八石瓦礫等並隨本色成寶餌之三粒三尸九蟲盡出一本去長生不死非止於人雞犬禽畜與服亦不死矣服餌之法以木密為丸麻子大依分兩逐年服餌取八節甲子上會之日捧藥跪坐向日念天真餌之點汞用藥訣汞藥和研投鍋子中還以些些藥蓋之上以瓷器蓋四面濕紙纒郤坐於虛灰中以火約半斤遙逼一盤飯久漸加火半日已來燒通赤須臾結硬作團伏火鼓之一本冶鎔成質為寶轉制并點頑訣隨其守運歲月用藥多少制汞斤兩為金銀復將點銅鍮石為大銀每斤用汞銀二兩其汞銀還將守運為藥轉制汞無斷絶但守一年一本運可用三兩制汞一斤為白道守運二年用二兩制汞一斤為白道守運三年用一兩制汞一斤為白道制汞入黃白利用訣二汞入鼎釜固濟作壇圈埋灰中向上灰可厚五寸上頭運火初五兩一伏時加七兩一伏時加十二兩一伏時加至一斤復八伏時即於鼎四面用武火逼通赤半日許開取之一兩點汞一斤為白道其藥換鼎子還用火一斤晝夜至一年半兩點汞一斤為白道復換鼎子還用火一斤晝夜至一年半兩點汞一斤為白道復換鼎用火一斤守二年一分半點汞一斤為自道復換鼎守至二年一分點汞一斤其鼎須逐年換制與上同依年月用藥分兩點化並成珍寶紅鉛入黑鉛訣
